# CI — runs on every push/PR to main: type-check + unit tests.
# A red ✗ on a commit means it must not ship (build or OTA).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.11.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit -p tsconfig.json

      - name: Unit tests
        run: npx jest --ci
